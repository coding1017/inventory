<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>
  <!-- Package/Box icon -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Box body -->
    <path d="M0,-120 L120,-60 L120,60 L0,120 L-120,60 L-120,-60 Z" fill="rgba(255,255,255,0.08)"/>
    <!-- Middle line -->
    <line x1="-120" y1="-60" x2="120" y2="-60" opacity="0"/>
    <path d="M0,-120 L120,-60 L120,60 L0,120 L-120,60 L-120,-60 Z"/>
    <!-- Center horizontal -->
    <line x1="-120" y1="-60" x2="0" y2="0"/>
    <line x1="120" y1="-60" x2="0" y2="0"/>
    <line x1="0" y1="0" x2="0" y2="120"/>
    <!-- Top flap lines -->
    <line x1="0" y1="-120" x2="0" y2="0" opacity="0.3"/>
    <!-- Scan line effect -->
    <line x1="-60" y1="-30" x2="60" y2="-30" stroke="rgba(255,255,255,0.5)" stroke-width="12" stroke-dasharray="8 12"/>
  </g>
</svg>
